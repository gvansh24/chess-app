<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chess vs Stockfish</title>

    <link rel="stylesheet" href="chessboard.min.css">
    <script src="jquery.min.js"></script>
    <script src="chess.min.js"></script>
    <script src="chessboard.min.js"></script>

    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app">
        <header>
            <h1>Chess <span class="vs">vs</span> Stockfish</h1>
        </header>

        <main>
            <div class="board-wrapper">
                <div id="board"></div>
                <div id="promotionPicker" class="promotion-picker"></div>
            </div>

            <aside class="sidebar">
                <div class="status-card">
                    <div class="status-label">Status</div>
                    <div id="status" class="status-text">Connecting...</div>
                </div>

                <div class="control-card">
                    <label class="control-label" for="difficultySelect">Difficulty</label>
                    <select id="difficultySelect">
                        <option value="beginner">Beginner</option>
                        <option value="intermediate" selected>Intermediate</option>
                        <option value="hard">Hard</option>
                        <option value="max">Maximum</option>
                    </select>
                </div>

                <div class="button-group">
                    <button id="newGameBtn" class="btn btn-primary">New Game</button>
                    <button id="rotateBoardBtn" class="btn btn-secondary">Rotate View</button>
                </div>

                <div class="legend">
                    <div class="legend-item">
                        <span class="dot white-dot"></span> You (White)
                    </div>
                    <div class="legend-item">
                        <span class="dot black-dot"></span> Stockfish (Black)
                    </div>
                </div>
            </aside>
        </main>
    </div>

    <div id="gameOverModal" class="game-over-modal">
        <div class="game-over-card">
            <div id="gameOverResult" class="game-over-result"></div>
            <div id="gameOverReason" class="game-over-reason"></div>
            <div class="game-over-buttons">
                <button id="gameOverNewGame" class="btn btn-primary">New Game</button>
                <button id="gameOverClose" class="btn btn-secondary">Close</button>
            </div>
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
