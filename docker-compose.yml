version: '3.8'

services:
  backend:
    build: ./backend
    restart: always
    networks:
      - chess-net

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    networks:
      - chess-net

networks:
  chess-net:
    driver: bridge
